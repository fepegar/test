name: Bug Report
description: If you are pretty sure you are getting a bug, please create a report to help us improve TorchIO
labels: ["bug"]

body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
      - label: I have searched the existing issues
        required: true

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: Please provide 1-2 short sentences that succinctly describe the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Code for reproduction
      description: "If possible, please provide a minimum self-contained example: https://stackoverflow.com/help/minimal-reproducible-example"
      placeholder: Paste your code here
      render: python
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual outcome
      description: Please provide the output produced by the above code, which may be a screenshot, console output, etc.
      placeholder: if applicable, paste the console output and images here
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected outcome
      description: Please provide a description (or visual example) of the expected outcome from the code snippet. If this used to work in an earlier version of Matplotlib, please note the version it used to work on
    validations:
      required: true

  - type: dropdown
    id: browsers
    attributes:
      label: What browsers are you seeing the problem on?
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://example.com)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
